<svg xmlns="http://www.w3.org/2000/svg" width="600" height="220" viewBox="0 0 600 220">
  <title>Natural Brow</title>
  <!-- 좌측 눈썹 (화면 기준 — 사용자 시점에선 본인의 오른쪽 눈썹) -->
  <g transform="translate(60,110)">
    <!-- 결 텍스처를 가는 선들로 표현 -->
    <g stroke="#3D2A22" stroke-linecap="round" fill="none">
      <path d="M0,15 Q40,-12 100,-18 Q150,-22 200,-8" stroke-width="14" opacity="0.55"/>
      <path d="M5,10 Q45,-10 100,-16 Q145,-19 195,-6" stroke-width="9" opacity="0.7"/>
      <path d="M10,6 Q50,-7 100,-13 Q140,-15 190,-4" stroke-width="5" opacity="0.85"/>
    </g>
    <g stroke="#2B1D17" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.9">
      <path d="M5,8 q15,-5 30,-9"/>
      <path d="M30,2 q20,-6 40,-9"/>
      <path d="M65,-5 q25,-5 50,-7"/>
      <path d="M115,-9 q25,-2 50,1"/>
      <path d="M155,-7 q15,3 30,7"/>
    </g>
  </g>
  <!-- 우측 눈썹 (좌우 거울상) -->
  <g transform="translate(540,110) scale(-1,1)">
    <g stroke="#3D2A22" stroke-linecap="round" fill="none">
      <path d="M0,15 Q40,-12 100,-18 Q150,-22 200,-8" stroke-width="14" opacity="0.55"/>
      <path d="M5,10 Q45,-10 100,-16 Q145,-19 195,-6" stroke-width="9" opacity="0.7"/>
      <path d="M10,6 Q50,-7 100,-13 Q140,-15 190,-4" stroke-width="5" opacity="0.85"/>
    </g>
    <g stroke="#2B1D17" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.9">
      <path d="M5,8 q15,-5 30,-9"/>
      <path d="M30,2 q20,-6 40,-9"/>
      <path d="M65,-5 q25,-5 50,-7"/>
      <path d="M115,-9 q25,-2 50,1"/>
      <path d="M155,-7 q15,3 30,7"/>
    </g>
  </g>
</svg>
